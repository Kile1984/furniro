<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon.png"
    />
    <script src="js/main.js defer"></script>
    <title>Furniro | Shop</title>
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="container container--wide header__inner">
        <a href="index.html" class="header__logo">
          <img src="./assets/images/Logo.png" alt="Logo" />
        </a>

        <nav class="header__nav" aria-label="Main navigation">
          <ul class="header__nav-list">
            <li>
              <a href="index.html" class="header__nav-link nav-link">Home</a>
            </li>
            <li>
              <a href="shop.html" class="header__nav-link nav-link">Shop</a>
            </li>
            <li>
              <a href="about.html" class="header__nav-link nav-link active-link"
                >About</a
              >
            </li>
            <li>
              <a href="contact.html" class="header__nav-link nav-link"
                >Contact</a
              >
            </li>
          </ul>
        </nav>
        <div class="header__actions">
          <ul class="header__actions-list">
            <li>
              <a href="account.html" aria-label="Account">
                <svg class="icon">
                  <use
                    href="./assets/icons/sprite.svg#icon-account-alert"
                  ></use>
                </svg>
              </a>
            </li>
            <li>
              <a href="search.html" aria-label="Search">
                <svg class="icon">
                  <use href="./assets/icons/sprite.svg#icon-search"></use>
                </svg>
              </a>
            </li>

            <li>
              <a href="whishlist.html" aria-label="Whishlist">
                <svg class="icon">
                  <use href="./assets/icons/sprite.svg#icon-heart"></use>
                </svg>
              </a>
            </li>

            <li>
              <a href="shopping-cart" aria-label="Cart">
                <svg class="icon icon-search">
                  <use
                    href="./assets/icons/sprite.svg#icon-shipping-cart"
                  ></use>
                </svg>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </header>

    <main class="page page--contact"></main>

    <footer class="footer">
      <div class="footer__inner container">
        <div class="footer__info">
          <a href="#" class="footer__logo">
            <img src="./assets/images/Logo.png" alt="Logo" />
          </a>
          <p class="footer__address text-body">
            400 University Drive Suite 200 Coral Gables, <br />FL 33134 USA
          </p>
        </div>

        <ul class="footer__links">
          <h4 class="footer__heading">Links</h4>
          <li class="footer__item">
            <a href="index.html" class="footer__link">Home</a>
          </li>
          <li class="footer__item">
            <a href="shop.html" class="footer__link">Shop</a>
          </li>
          <li class="footer__item">
            <a href="about.html" class="footer__link active-link">About</a>
          </li>
          <li class="footer__item">
            <a href="contact.html" class="footer__link">Contact</a>
          </li>
        </ul>

        <ul class="footer__links">
          <h4 class="footer__heading">Help</h4>
          <li class="footer__item">
            <a href="payment.html" class="footer__link">Payment Options</a>
          </li>
          <li class="footer__item">
            <a href="returns.html" class="footer__link">Returns</a>
          </li>
          <li class="footer__item">
            <a href="privacy.html" class="footer__link">Privacy Policies</a>
          </li>
        </ul>

        <div class="footer__newsletter">
          <h4 class="footer__heading">Newsletter</h4>
          <form action="#" class="footer__form">
            <input
              type="email"
              class="footer__mail"
              id="mail"
              placeholder="Enter Your Email Address"
            />

            <button class="footer__submit btn">Subscribe</button>
          </form>
        </div>

        <div class="footer__rights">
          <p>2023 furino. All rights reverved</p>
        </div>
      </div>
    </footer>
  </body>
</html>
